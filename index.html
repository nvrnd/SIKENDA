<style>
:root {
  --navy:#0B1426; --navy2:#112040; --navy3:#1a3060;
  --gold:#C8A84B; --gold2:#e8c870; --gold3:#f5e199;
  --teal:#1DAFA8; --teal2:#26d4cc;
  --red:#E53E3E; --orange:#DD6B20; --green:#38A169; --blue:#3182CE;
  --card:rgba(255,255,255,0.04); --card2:rgba(255,255,255,0.08);
  --border:rgba(200,168,75,0.2); --border2:rgba(200,168,75,0.4);
  --text:#E8EAF0; --text2:#A0AAC0; --text3:#6B7899;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(29,175,168,0.06),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(200,168,75,0.05),transparent 60%);pointer-events:none;z-index:0}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--navy)}
.login-box{background:linear-gradient(135deg,rgba(17,32,64,0.98),rgba(11,20,38,0.98));border:1px solid var(--border2);border-radius:20px;padding:48px 56px;width:440px;box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(200,168,75,0.1);text-align:center}
.login-logo{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;color:var(--gold);letter-spacing:4px;margin-bottom:2px}
.login-tagline{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:32px}
.form-input,.form-select{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:12px;outline:none;transition:border-color 0.2s}
.form-input:focus,.form-select:focus{border-color:var(--gold)}
.form-select option{background:var(--navy2)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:10px;color:var(--navy);font-weight:700;font-size:15px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;letter-spacing:0.5px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(200,168,75,0.3)}
.login-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:20px}
.login-loading{color:var(--teal2);font-size:12px;margin-top:8px}

/* ── APP ── */
#app{display:none;min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;background:rgba(11,20,38,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px}
.topbar-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--gold);letter-spacing:2px;white-space:nowrap}
.topbar-divider{width:1px;height:32px;background:var(--border)}
.topbar-info{flex:1}
.topbar-title{font-size:12px;color:var(--text3);letter-spacing:.5px}
.topbar-user{font-size:15px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-time{font-family:'DM Mono',monospace;font-size:13px;color:var(--teal);background:rgba(29,175,168,0.1);padding:4px 12px;border-radius:6px;border:1px solid rgba(29,175,168,0.2)}
.topbar-date{font-size:11px;color:var(--text3);text-align:center}
.topbar-btn{padding:6px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.logout-btn{background:rgba(229,62,62,0.15);border:1px solid rgba(229,62,62,0.3);color:var(--red)}
.logout-btn:hover{background:rgba(229,62,62,0.25)}

.sidebar{position:fixed;left:0;top:64px;bottom:0;width:224px;background:rgba(11,20,38,0.98);border-right:1px solid var(--border);overflow-y:auto;z-index:90;padding:12px 0}
.nav-section{padding:10px 16px 4px;font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all 0.2s;border-left:3px solid transparent;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-item.active{color:var(--gold);background:rgba(200,168,75,0.08);border-left-color:var(--gold)}
.nav-icon{width:20px;text-align:center;font-size:15px}

.main-content{margin-left:224px;margin-top:64px;padding:24px;min-height:calc(100vh - 64px);position:relative;z-index:1}
.page{display:none}.page.active{display:block;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ── */
.page-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gold);margin-bottom:4px}
.page-sub{color:var(--text2);font-size:13px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:20px}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-title{font-weight:600;font-size:14px;color:var(--gold2);flex:1}
.card-badge{font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(200,168,75,0.15);color:var(--gold);font-weight:600;letter-spacing:.5px}

/* ── FORM ── */
.fi,.ft,.fs{width:100%;padding:9px 13px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.fi:focus,.ft:focus,.fs:focus{border-color:var(--gold)}
.ft{resize:vertical;min-height:64px}
.fs option{background:var(--navy2)}
.fi:disabled,.ft:disabled,.fs:disabled{opacity:0.45;cursor:not-allowed}
.fl{font-size:11px;color:var(--text3);margin-bottom:4px;display:block;letter-spacing:.3px}
.fr{margin-bottom:12px}

/* ── BUTTONS ── */
.btn{padding:9px 20px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy)}
.btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,168,75,0.35)}
.btn-teal{background:rgba(29,175,168,0.18);color:var(--teal2);border:1px solid rgba(29,175,168,0.3)}
.btn-teal:hover:not(:disabled){background:rgba(29,175,168,0.28)}
.btn-red{background:rgba(229,62,62,0.15);color:#fc8181;border:1px solid rgba(229,62,62,0.3)}
.btn-red:hover:not(:disabled){background:rgba(229,62,62,0.25)}
.btn-green{background:rgba(56,161,105,0.18);color:#68d391;border:1px solid rgba(56,161,105,0.3)}
.btn-green:hover:not(:disabled){background:rgba(56,161,105,0.28)}
.btn-blue{background:rgba(49,130,206,0.18);color:#90cdf4;border:1px solid rgba(49,130,206,0.3)}
.btn-blue:hover:not(:disabled){background:rgba(49,130,206,0.28)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 9px;font-size:11px}

/* ── WORK BOX ── */
.work-boxes{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.work-box{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative}
.work-box.locked::after{content:'🔒 Terkunci';position:absolute;top:10px;right:10px;font-size:10px;color:var(--text3);background:rgba(0,0,0,0.35);padding:2px 8px;border-radius:4px}
.work-box-num{font-size:10px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}

/* ── PROGRESS ── */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prog-wrap{flex:1;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width 0.4s}
.prog-pct{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);font-weight:500;min-width:38px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(56,161,105,0.2);color:#68d391;border:1px solid rgba(56,161,105,0.3)}
.badge-red{background:rgba(229,62,62,0.2);color:#fc8181;border:1px solid rgba(229,62,62,0.3)}
.badge-orange{background:rgba(221,107,32,0.2);color:#f6ad55;border:1px solid rgba(221,107,32,0.3)}
.badge-gold{background:rgba(200,168,75,0.2);color:var(--gold2);border:1px solid rgba(200,168,75,0.3)}
.badge-blue{background:rgba(49,130,206,0.2);color:#90cdf4;border:1px solid rgba(49,130,206,0.3)}
.badge-teal{background:rgba(29,175,168,0.2);color:var(--teal2);border:1px solid rgba(29,175,168,0.3)}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1100px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.sidebar{display:none}.main-content{margin-left:0}.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── STATS ── */
.stat-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:4px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border)}
th{padding:10px 14px;font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;text-align:left;font-weight:600;white-space:nowrap}
td{padding:10px 14px;font-size:13px;color:var(--text);border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top}
tr:hover td{background:rgba(255,255,255,0.02)}
td.mono{font-family:'DM Mono',monospace}
td.c-red{color:#fc8181} td.c-orange{color:#f6ad55} td.c-green{color:#68d391}

/* ── STARS ── */
.stars{display:flex;gap:4px}
.star{font-size:22px;cursor:pointer;color:#333;transition:color 0.15s;line-height:1}
.star.on{color:var(--gold)}
.star:hover{color:var(--gold2)}

/* ── VALIDATION SECTION ── */
.val-section{margin-top:14px;padding-top:12px;border-top:1px dashed rgba(200,168,75,0.25)}
.val-title{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

/* ── INDIKATOR ── */
.ind-item{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;transition:border-color 0.2s}
.ind-item.warn{border-color:rgba(221,107,32,0.4);background:rgba(221,107,32,0.04)}
.ind-item.danger{border-color:rgba(229,62,62,0.4);background:rgba(229,62,62,0.04)}
.ind-item.ok{border-color:rgba(56,161,105,0.3)}

/* ── BAR CHART ── */
.bar-chart{display:flex;gap:10px;align-items:flex-end;height:160px;padding:0 4px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold2)}
.bar-body{width:100%;border-radius:4px 4px 0 0;transition:height 0.5s}
.bar-lbl{font-size:9px;color:var(--text3);text-align:center;line-height:1.3;word-break:break-all}

/* ── STAR CARD ── */
.star-card{background:linear-gradient(135deg,rgba(200,168,75,0.12),rgba(200,168,75,0.04));border:1px solid var(--border2);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.star-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--navy);font-family:'Playfair Display',serif;flex-shrink:0}
.star-name{font-weight:600;font-size:14px;color:var(--gold2)}
.star-unit{font-size:11px;color:var(--text3);margin-top:2px}

/* ── LOG ── */
.log-entry{background:rgba(255,255,255,0.03);border-radius:8px;padding:12px 16px;margin-bottom:8px;border-left:3px solid var(--gold)}
.log-meta{font-size:11px;color:var(--text3);margin-bottom:4px;font-family:'DM Mono',monospace}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-box{background:var(--navy2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,0.6)}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--navy2);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;z-index:99999;font-size:13px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,0.4);transform:translateY(100px);opacity:0;transition:all 0.3s;max-width:360px}
#toast.show{transform:translateY(0);opacity:1}

/* ── MISC ── */
.sep{height:1px;background:var(--border);margin:20px 0}
.scroll-box{max-height:420px;overflow-y:auto}
.scroll-box::-webkit-scrollbar{width:4px}
.scroll-box::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px;width:fit-content;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.2s;white-space:nowrap}
.tab.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-weight:700}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--teal);margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.loading-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(200,168,75,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.flex{display:flex}.flex-c{display:flex;align-items:center}.flex-b{display:flex;align-items:center;justify-content:space-between}
.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.text-muted{color:var(--text2)}.text-gold{color:var(--gold)}.text-teal{color:var(--teal2)}
.text-green{color:#68d391}.text-red{color:#fc8181}.text-orange{color:#f6ad55}
.fw6{font-weight:600}.w-full{width:100%}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {
  getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc,
  updateDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp, Timestamp
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ── INIT FIREBASE ──
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);

// ── STATE ──
let CU = null; // current user
let ALL_USERS = [];
const UNITS = { sekretariat:'Sekretariat', p2p:'Bidang P2P', pelkes:'Bidang Pelayanan Kesehatan', kesmas:'Bidang Kesmas', sdk:'Bidang SDK' };
const UNIT_KEYS = Object.keys(UNITS);
let today = getTodayStr();
let valStarsMap = {};

// ── HELPERS ──
function getTodayStr() { return new Date().toISOString().split('T')[0]; }
function getYesterdayStr() { const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0]; }
function formatDate(str) {
  if(!str) return '—';
  const d=new Date(str+'T00:00:00');
  const days=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const months=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
function formatRp(n) { if(!n) return 'Rp 0'; return 'Rp '+Number(n).toLocaleString('id-ID'); }
function isAfterWork() { const now=new Date(); return now.getHours()>=16; }
function progColor(p) { return p<50?'var(--red)':p<80?'var(--orange)':'var(--green)'; }
function initials(name) { return (name||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase(); }
function toast(msg, dur=3000) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}
function showModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}
window.closeModal = function(e) { if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').style.display='none'; }
window._closeModal = function() { document.getElementById('modal-overlay').style.display='none'; }

// ── CLOCK ──
function startClock() {
  function tick() {
    const now=new Date();
    const h=String(now.getHours()).padStart(2,'0');
    const m=String(now.getMinutes()).padStart(2,'0');
    const s=String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent=`${h}:${m}:${s} WIB`;
    document.getElementById('tb-date').textContent=formatDate(getTodayStr());
    today=getTodayStr();
  }
  tick(); setInterval(tick,1000);
}

// ── SESSION PERSISTENCE ──
const SESSION_KEY = 'sikenda_session_v2';

function saveSession(user) {
  // Simpan data user ke localStorage (tanpa password untuk keamanan)
  const sessionData = {
    id: user.id,
    name: user.name,
    label: user.label,
    role: user.role,
    unit: user.unit,
    superior: user.superior || null,
    savedAt: Date.now()
  };
  localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}

function getSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    // Sesi expire setelah 8 jam (28800000 ms)
    if (Date.now() - s.savedAt > 28800000) { clearSession(); return null; }
    return s;
  } catch(e) { return null; }
}

// ── AUTO RESTORE SESSION ON LOAD ──
async function tryRestoreSession() {
  const session = getSession();
  if (!session) {
    // Tidak ada sesi — tampilkan login
    await loadUsersForLogin();
    return;
  }

  // Ada sesi — tampilkan splash loading
  document.getElementById('login-screen').innerHTML = `
    <div class="login-box" style="text-align:center">
      <div class="login-logo">SIKENDA</div>
      <div class="login-tagline">Memulihkan sesi...</div>
      <div style="margin:24px 0"><span class="loading-spinner" style="width:24px;height:24px;border-width:3px"></span></div>
      <div style="font-size:13px;color:var(--text2)">Selamat datang kembali,<br><strong style="color:var(--gold)">${session.name}</strong></div>
    </div>`;

  try {
    // Verifikasi ke Firestore — pastikan akun masih aktif & data masih valid
    const snap = await getDoc(doc(db, 'users', session.id));
    if (!snap.exists()) { clearSession(); location.reload(); return; }
    const u = { id: snap.id, ...snap.data() };
    if (u.active === false) {
      clearSession();
      document.getElementById('login-screen').innerHTML = `
        <div class="login-box"><div class="login-logo">SIKENDA</div>
        <div class="login-tagline">Akun Dinonaktifkan</div>
        <p style="color:#fc8181;margin:16px 0;font-size:13px">Akun Anda telah dinonaktifkan.<br>Hubungi administrator.</p>
        <button class="login-btn" onclick="location.reload()">Kembali ke Login</button></div>`;
      return;
    }
    // Sesi valid — perbarui data user terbaru dari Firestore
    CU = u;
    saveSession(u); // Perbarui timestamp sesi
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } catch(e) {
    // Gagal verifikasi (misal offline) — gunakan data sesi lokal
    console.warn('Verifikasi sesi gagal, menggunakan data lokal:', e.message);
    CU = session;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  }
}

async function loadUsersForLogin() {
  // Reset tampilan login normal
  document.getElementById('login-screen').innerHTML = `
    <div class="login-box">
      <div class="login-logo">SIKENDA</div>
      <div class="login-tagline">Sistem Kendali Kinerja — Dinkes Kab. Lima Puluh Kota</div>
      <select class="form-select" id="login-user" style="margin-bottom:12px">
        <option value="">— Memuat daftar pengguna... —</option>
      </select>
      <input type="password" class="form-input" id="login-pass" placeholder="Password" style="margin-bottom:16px">
      <button class="login-btn" id="login-btn" onclick="doLogin()">MASUK</button>
      <div class="login-err" id="login-err"></div>
      <div class="login-loading" id="login-loading" style="display:none"><span class="loading-spinner"></span> Memuat...</div>
    </div>`;
  document.getElementById('login-pass').addEventListener('keyup', e => { if(e.key==='Enter') doLogin(); });

  try {
    const snap = await getDocs(collection(db,'users'));
    ALL_USERS = snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.active!==false);
    const sel = document.getElementById('login-user');
    sel.innerHTML = '<option value="">— Pilih Pengguna —</option>';
    ALL_USERS.sort((a,b)=>a.name.localeCompare(b.name)).forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = `${u.name} — ${u.label}`;
      sel.appendChild(opt);
    });
  } catch(e) {
    const sel = document.getElementById('login-user');
    if(sel) sel.innerHTML = '<option value="">⚠ Gagal memuat data</option>';
    console.error(e);
  }
}

// ── LOGIN ──
window.doLogin = async function() {
  const uid = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value.trim();
  const err = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  const ldg = document.getElementById('login-loading');
  err.textContent = '';
  if(!uid){err.textContent='Pilih pengguna terlebih dahulu.';return;}
  if(!pass){err.textContent='Masukkan password.';return;}
  btn.disabled=true; ldg.style.display='block';
  try {
    const snap = await getDoc(doc(db,'users',uid));
    if(!snap.exists()){err.textContent='Pengguna tidak ditemukan.';return;}
    const u={id:snap.id,...snap.data()};
    if(u.pass !== pass){err.textContent='Password salah.';return;}
    if(u.active===false){err.textContent='Akun dinonaktifkan. Hubungi admin.';return;}
    CU = u;
    saveSession(u); // ← Simpan sesi ke localStorage
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } catch(e) {
    err.textContent='Error: '+e.message;
  } finally {
    if(document.getElementById('login-btn')) {
      document.getElementById('login-btn').disabled=false;
    }
    if(document.getElementById('login-loading')) {
      document.getElementById('login-loading').style.display='none';
    }
  }
};

window.doLogout = function() {
  clearSession(); // ← Hapus sesi dari localStorage
  CU=null;
  document.getElementById('app').style.display='none';
  // Reload halaman agar sesi bersih total
  location.reload();
};

async function renderExecutive() {
  const el = document.getElementById('page-executive');
  el.innerHTML = `<div class="page-title">Executive View</div><div class="page-sub">${formatDate(today)}</div><div style="text-align:center;padding:40px"><span class="loading-spinner"></span> Memuat data...</div>`;

  // Fetch realisasi all units
  const realSnap = await getDocs(collection(db,'realisasi'));
  const realAll = realSnap.docs.map(d=>({id:d.id,...d.data()}));

  let totAnggaran=0,totKreal=0,totFItems=0,totFCnt=0;
  const unitReal={};
  UNIT_KEYS.forEach(u=>{unitReal[u]={fSum:0,fCnt:0,anggaran:0,kreal:0}});
  realAll.forEach(k=>{
    const u=k.unit;
    if(!u||!UNIT_KEYS.includes(u)) return;
    totAnggaran+=Number(k.anggaran||0);
    totKreal+=Number(k.kreal||0);
    totFCnt++;
    totFItems+=Number(k.freal||0);
    unitReal[u].fSum+=Number(k.freal||0);
    unitReal[u].fCnt++;
    unitReal[u].anggaran+=Number(k.anggaran||0);
    unitReal[u].kreal+=Number(k.kreal||0);
  });
  const avgF=totFCnt?Math.round(totFItems/totFCnt):0;
  const kPct=totAnggaran?Math.round(totKreal/totAnggaran*100):0;

  // Fetch indikators
  const indSnap = await getDocs(collection(db,'indikators'));
  const indAll = indSnap.docs.map(d=>({id:d.id,...d.data()}));

  // Fetch star5 yesterday
  const yest=getYesterdayStr();
  const logSnap=await getDocs(query(collection(db,'logs'),where('type','==','star5'),where('date','==',yest)));
  const star5=logSnap.docs.map(d=>d.data());

  // Build HTML
  let h=`<div class="page-title">Executive View</div>
  <div class="page-sub" id="exec-date">Ringkasan Kinerja — ${formatDate(today)}</div>
  <div class="g4" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-num">${avgF}%</div><div class="stat-lbl">Rata-rata Realisasi Fisik</div></div>
    <div class="stat-card"><div class="stat-num">${kPct}%</div><div class="stat-lbl">Realisasi Keuangan</div></div>
    <div class="stat-card"><div class="stat-num">${formatRp(totAnggaran)}</div><div class="stat-lbl">Total Anggaran Dinas</div></div>
    <div class="stat-card"><div class="stat-num">${formatRp(totKreal)}</div><div class="stat-lbl">Total Realisasi Keuangan</div></div>
  </div>
  <div class="g2" style="margin-bottom:20px">
    <div class="card"><div class="card-header"><span class="card-title">📈 Realisasi Fisik per Unit</span></div>`;

  // Charts
  h+=`<div class="bar-chart">`;
  UNIT_KEYS.forEach(u=>{
    const d=unitReal[u];
    const v=d.fCnt?Math.round(d.fSum/d.fCnt):0;
    const ht=Math.round(v/100*140);
    const col=progColor(v);
    h+=`<div class="bar-col">
      <div class="bar-val">${v}%</div>
      <div class="bar-body" style="height:${ht}px;background:${col}"></div>
      <div class="bar-lbl">${UNITS[u].replace('Bidang ','').replace('Sekretariat','Sekret.')}</div>
    </div>`;
  });
  h+=`</div></div>
  <div class="card"><div class="card-header"><span class="card-title">💰 Realisasi Keuangan per Unit</span></div>
  <div class="bar-chart">`;
  UNIT_KEYS.forEach(u=>{
    const d=unitReal[u];
    const v=d.anggaran?Math.round(d.kreal/d.anggaran*100):0;
    const ht=Math.round(v/100*140);
    const col=progColor(v);
    h+=`<div class="bar-col">
      <div class="bar-val">${v}%</div>
      <div class="bar-body" style="height:${ht}px;background:${col}"></div>
      <div class="bar-lbl">${UNITS[u].replace('Bidang ','').replace('Sekretariat','Sekret.')}</div>
    </div>`;
  });
  h+=`</div></div></div>`;

  // Indikator summary
  h+=`<div class="card" style="margin-bottom:20px"><div class="card-header"><span class="card-title">🎯 Capaian Indikator per Bidang</span></div>`;
  UNIT_KEYS.forEach(u=>{
    const items=indAll.filter(i=>i.unit===u&&i.active!==false);
    if(!items.length) return;
    h+=`<div style="margin-bottom:16px"><div class="fw6 text-gold mb-8" style="font-size:13px;margin-bottom:8px">${UNITS[u]}</div>`;
    items.forEach(item=>{
      const real=parseFloat(item.realisasi)||0;
      const tgt=parseFloat(item.targetBulan)||0;
      const pct=tgt>0?Math.min(Math.round(real/tgt*100),150):null;
      const col=pct===null?'var(--text3)':pct<70?'var(--red)':pct<90?'var(--orange)':'var(--green)';
      h+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;font-size:12px">

  <div class="fr"><label class="fl">Catatan / Instruksi Atasan</label>

function attachDailyEvents(data) {
  // Progress live update
  [0,1,2].forEach(i=>{
    const selK=document.getElementById('wk-prog-'+i);
    if(selK) selK.addEventListener('change',()=>{
      const v=parseInt(selK.value);
      const bar=document.getElementById('wk-bar-'+i);
      const pct=document.getElementById('wk-pct-'+i);
      if(bar) bar.style.cssText=`width:${v}%;background:${progColor(v)}`;
      if(pct) pct.textContent=v+'%';
    });
  });

  // Save kabid
  const bK=document.getElementById('btn-save-kabid');
  if(bK) bK.onclick=()=>saveKabidWorks(data);

  // Save kasubag
  const bWS=document.getElementById('btn-save-ws');
  if(bWS) bWS.onclick=()=>saveKasubagWorks(data);
  const bWU=document.getElementById('btn-save-wu');
  if(bWU) bWU.onclick=()=>saveKasubagUrgent(data);

  // Save staf
  const bS=document.getElementById('btn-save-staf');
  if(bS) bS.onclick=()=>saveStafTasks(data);
}

async function saveKabidWorks(existing) {
  const key=`daily_${CU.id}_${today}`;
  const works=[];
  for(let i=0;i<3;i++){
    const ex=(existing.works||[])[i]||{};
    if(ex.validatedKadis){works.push(ex);continue;}
    const desc=document.getElementById(`wk-desc-${i}`)?.value||'';
    const prog=parseInt(document.getElementById(`wk-prog-${i}`)?.value||0);
    works.push({desc, output:document.getElementById(`wk-out-${i}`)?.value||'', target:document.getElementById(`wk-tgt-${i}`)?.value||'', progress:prog, validatedKadis:false, noteKadis:ex.noteKadis||''});
    if(prog===100&&desc) await addLog({type:'kabid_work',user:CU.id,userName:CU.name,userLabel:CU.label,unit:CU.unit,date:today,desc,output:document.getElementById(`wk-out-${i}`)?.value||''});
  }
  await setDoc(doc(db,'daily',key),{...existing,works,updatedAt:new Date().toISOString()},{merge:true});
  toast('✅ Catatan berhasil disimpan!'); renderDaily();
}

window._setTask = async function(i, tuntas) {
  const key=`daily_${CU.id}_${today}`;
  const snap=await getDoc(doc(db,'daily',key));
  const data=snap.exists()?snap.data():{};
  if(!data.tasks) data.tasks=[];
  while(data.tasks.length<=i) data.tasks.push({});
  data.tasks[i].tuntas=tuntas;
  data.tasks[i].desc=document.getElementById(`st-desc-${i}`)?.value||data.tasks[i].desc||'';
  data.tasks[i].output=document.getElementById(`st-out-${i}`)?.value||data.tasks[i].output||'';
  await setDoc(doc(db,'daily',key),data,{merge:false});
  renderDaily();
};
window._addTask = async function() {
  const key=`daily_${CU.id}_${today}`;
  const snap=await getDoc(doc(db,'daily',key));
  const data=snap.exists()?snap.data():{};
  // Save current values first
  const tasks=data.tasks||[];
  tasks.forEach((t,i)=>{
    t.desc=document.getElementById(`st-desc-${i}`)?.value||t.desc||'';
    t.output=document.getElementById(`st-out-${i}`)?.value||t.output||'';
  });
  tasks.push({});
  data.tasks=tasks;
  await setDoc(doc(db,'daily',key),data,{merge:false});
  renderDaily();
};
async function saveStafTasks(existing) {
  const key=`daily_${CU.id}_${today}`;
  const tasks=(existing.tasks||[]).map((t,i)=>({
    ...t,
    desc:document.getElementById(`st-desc-${i}`)?.value||t.desc||'',
    output:document.getElementById(`st-out-${i}`)?.value||t.output||''
  }));
  for(const t of tasks) {
    if(t.tuntas&&t.desc) await addLog({type:'staf_task',user:CU.id,userName:CU.name,userLabel:CU.label,unit:CU.unit,date:today,desc:t.desc,output:t.output||''});
  }
  await setDoc(doc(db,'daily',key),{...existing,tasks,updatedAt:new Date().toISOString()},{merge:true});
  toast('✅ Kegiatan disimpan!'); renderDaily();
}

async function addLog(entry) {
  await addDoc(collection(db,'logs'),{...entry,savedAt:new Date().toISOString()});
}

async function renderValidasi() {
  const el=document.getElementById('page-validasi');
  el.innerHTML=`<div class="page-title">Validasi Atasan</div><div class="page-sub">Validasi catatan bawahan langsung — ${formatDate(today)}</div><div style="text-align:center;padding:32px"><span class="loading-spinner"></span></div>`;

  // Load all users from Firestore
  const usSnap=await getDocs(collection(db,'users'));
  ALL_USERS=usSnap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.active!==false);

  let reports=[];
  if(CU.role==='kadis') reports=ALL_USERS.filter(u=>u.role==='kabid'||u.id==='sekretaris');
  else reports=ALL_USERS.filter(u=>u.superior===CU.id);

  let h=`<div class="page-title">Validasi Atasan</div><div class="page-sub">Validasi catatan bawahan langsung — ${formatDate(today)}</div>`;

  if(!reports.length){h+=`<div class="card"><p class="text-muted">Tidak ada bawahan langsung.</p></div>`;el.innerHTML=h;return;}

  for(const rep of reports){
    const key=`daily_${rep.id}_${today}`;
    const snap=await getDoc(doc(db,'daily',key));
    const data=snap.exists()?snap.data():{};
    h+=`<div class="card"><div class="card-header"><span class="card-title">👤 ${rep.name}</span><span class="card-badge">${rep.label}</span></div>`;

    if(rep.role==='staf'){
      const tasks=data.tasks||[];
      if(!tasks.length){h+=`<p class="text-muted text-sm">Belum ada catatan kegiatan hari ini.</p>`;h+=`</div>`;continue;}
      tasks.forEach((t,i)=>{
        h+=`<div class="work-box mb-12" style="margin-bottom:12px">
          <div class="work-box-num">Kegiatan ${i+1}</div>
          <div class="fw6">${t.desc||'—'}</div>
          <div class="text-muted text-sm mt-8" style="margin-top:6px">Output: ${t.output||'—'}</div>
          <div class="mt-8">${t.tuntas?`<span class="badge badge-green">✅ Tuntas</span>`:`<span class="badge badge-orange">⏳ Belum Tuntas</span>`}</div>
        </div>`;
      });
      h+=`<div class="val-section">`;
      if(!data.validated){
        h+=`<div class="fr"><label class="fl">Catatan / Instruksi</label><textarea class="ft" id="val-note-${rep.id}" placeholder="Tulis catatan..."></textarea></div>
          <div class="fr"><label class="fl">Nilai Bintang</label>
          <div class="stars" id="val-stars-${rep.id}">`;
        for(let s=1;s<=5;s++) h+=`<span class="star" onclick="_setValStar('${rep.id}',${s})">★</span>`;
        h+=`</div></div><button class="btn btn-gold btn-sm" onclick="_validateStaf('${rep.id}')">✅ Validasi & Simpan</button>`;
      } else {
        h+=`<span class="badge badge-green">✅ Sudah Divalidasi</span>
          <div class="text-sm text-muted mt-8" style="margin-top:6px">Catatan: ${data.validNote||'—'}</div>
          <div class="stars mt-8" style="margin-top:6px">`;
        for(let s=1;s<=5;s++) h+=`<span class="star ${(data.stars||0)>=s?'on':''}" style="cursor:default">★</span>`;
        h+=`</div>`;
      }
      h+=`</div>`;
    }

    else if(rep.role==='kabid'||rep.role==='sekretaris'){
      const works=data.works||[];
      if(!works.filter(w=>w.desc).length){h+=`<p class="text-muted text-sm">Belum ada pekerjaan hari ini.</p>`;h+=`</div>`;continue;}
      works.forEach((w,i)=>{
        if(!w.desc) return;
        const pct=parseInt(w.progress||0);
        h+=`<div class="work-box mb-12" style="margin-bottom:12px">
          <div class="work-box-num">Pekerjaan ${i+1}</div>
          <div class="fw6">${w.desc}</div>
          <div class="text-sm text-muted">Output: ${w.output||'—'} | Target: ${w.target||'—'}</div>
          <div class="prog-row mt-8" style="margin-top:8px">
            <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${progColor(pct)}"></div></div>
            <span class="prog-pct">${pct}%</span>
          </div>`;
        if(!w.validatedKadis){
          h+=`<div class="val-section">
            <textarea class="ft" id="kv-note-${rep.id}-${i}" placeholder="Catatan Kepala Dinas..." style="min-height:48px">${w.noteKadis||''}</textarea>
            <button class="btn btn-gold btn-sm mt-8" style="margin-top:8px" onclick="_validateKabidWork('${rep.id}',${i})">✅ Validasi</button>
          </div>`;
        } else {
          h+=`<div class="val-section"><span class="badge badge-green">✅ Tervalidasi</span><div class="text-sm text-muted mt-8" style="margin-top:6px">${w.noteKadis||''}</div></div>`;
        }
        h+=`</div>`;
      });
    }

    else if(rep.role==='kasubag'){
      const works=data.works||[];
      const urgent=data.urgent||[];
      const allItems=[...works.map((w,i)=>({...w,type:'reg',idx:i})),...urgent.map((u,i)=>({...u,type:'urg',idx:i}))];
      if(!allItems.filter(x=>x.desc).length){h+=`<p class="text-muted text-sm">Belum ada pekerjaan hari ini.</p>`;h+=`</div>`;continue;}
      allItems.forEach(item=>{
        if(!item.desc) return;
        const pct=parseInt(item.progress||0);
        h+=`<div class="work-box mb-12" style="margin-bottom:12px;${item.type==='urg'?'border-color:rgba(229,62,62,0.35)':''}">
          <div class="work-box-num" ${item.type==='urg'?'style="color:var(--red)"':''}>${item.type==='urg'?'🚨 Mendesak':'📌 Reguler'} ${item.idx+1}</div>
          <div class="fw6">${item.desc}</div>
          <div class="text-sm text-muted">Output: ${item.output||'—'} | Target: ${item.target||'—'}</div>
          <div class="prog-row mt-8" style="margin-top:8px">
            <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${item.type==='urg'?'var(--red)':progColor(pct)}"></div></div>
            <span class="prog-pct">${pct}%</span>
          </div>`;
        if(!item.validated){
          h+=`<div class="val-section">
            <textarea class="ft" id="sv-note-${rep.id}-${item.type}-${item.idx}" placeholder="Catatan atasan..." style="min-height:44px"></textarea>
            <button class="btn btn-teal btn-sm mt-8" style="margin-top:8px" onclick="_validateKasubag('${rep.id}','${item.type}',${item.idx})">✅ Validasi</button>
          </div>`;
        } else {
          h+=`<div class="val-section"><span class="badge badge-green">✅ Tervalidasi</span><div class="text-sm text-muted mt-8" style="margin-top:6px">${item.noteAtasan||''}</div></div>`;
        }
        h+=`</div>`;
      });
    }
    h+=`</div>`;
  }
  el.innerHTML=h;
}

window._setValStar=function(repId,n){
  valStarsMap[repId]=n;
  document.querySelectorAll(`#val-stars-${repId} .star`).forEach((s,i)=>s.classList.toggle('on',i<n));
};
window._validateStaf=async function(repId){
  const note=document.getElementById(`val-note-${repId}`)?.value||'';
  const stars=valStarsMap[repId]||0;
  const key=`daily_${repId}_${today}`;
  const snap=await getDoc(doc(db,'daily',key));
  const data=snap.exists()?snap.data():{};
  data.validated=true; data.validNote=note; data.stars=stars;
  await setDoc(doc(db,'daily',key),data,{merge:false});
  if(stars===5){
    const u=ALL_USERS.find(x=>x.id===repId);
    await addLog({type:'star5',user:repId,userName:u?.name||repId,userLabel:u?.label||'',date:today});
  }
  const u=ALL_USERS.find(x=>x.id===repId);
  toast(`✅ Validasi untuk ${u?.name||repId} berhasil!`);
  renderValidasi();
};
window._validateKabidWork=async function(repId,idx){
  const note=document.getElementById(`kv-note-${repId}-${idx}`)?.value||'';
  const key=`daily_${repId}_${today}`;
  const snap=await getDoc(doc(db,'daily',key));
  const data=snap.exists()?snap.data():{};
  if(data.works&&data.works[idx]){data.works[idx].validatedKadis=true;data.works[idx].noteKadis=note;}
  await setDoc(doc(db,'daily',key),data,{merge:false});
  toast('✅ Pekerjaan tervalidasi!'); renderValidasi();
};
window._validateKasubag=async function(repId,type,idx){
  const note=document.getElementById(`sv-note-${repId}-${type}-${idx}`)?.value||'';
  const key=`daily_${repId}_${today}`;
  const snap=await getDoc(doc(db,'daily',key));
  const data=snap.exists()?snap.data():{};
  const arr=type==='urg'?'urgent':'works';
  if(data[arr]&&data[arr][idx]){data[arr][idx].validated=true;data[arr][idx].noteAtasan=note;}
  await setDoc(doc(db,'daily',key),data,{merge:false});
  toast('✅ Pekerjaan tervalidasi!'); renderValidasi();
};

          </div></td>`:''}
      </tr>`;
    });
    h+=`</tbody></table></div>`;
    const totA=items.reduce((a,k)=>a+Number(k.anggaran||0),0);
    const totK=items.reduce((a,k)=>a+Number(k.kreal||0),0);
    const avgF=items.length?Math.round(items.reduce((a,k)=>a+Number(k.freal||0),0)/items.length):0;
    h+=`<div class="g4 mt-16" style="margin-top:16px">
      <div class="stat-card"><div class="stat-num">${avgF}%</div><div class="stat-lbl">Rata-rata Fisik</div></div>

      <div class="stat-card"><div class="stat-num">${formatRp(totK)}</div><div class="stat-lbl">Total Realisasi</div></div>
    </div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}

async function renderIndikator() {
  const el=document.getElementById('page-indikator');
  el.innerHTML=`<div class="page-title">Indikator Kinerja</div><div style="text-align:center;padding:32px"><span class="loading-spinner"></span></div>`;

  const unit=CU.unit;
  const unitName=UNITS[unit]||unit;
  const canEdit=CU.role==='kasubag'||CU.role==='admin';
  const canManage=CU.role==='admin'; // tambah/hapus

  const snap=await getDocs(query(collection(db,'indikators'),where('unit','==',unit)));
  const items=snap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.active!==false);

  let h=`<div class="page-title">Indikator Kinerja</div>
  <div class="page-sub">${unitName} — Input oleh Sub Bagian/Sub Koordinator | Tahun ${new Date().getFullYear()}</div>`;

  // Add button — admin & kasubag
  if(canEdit){
    h+=`<div style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-gold" onclick="_showAddIndikator('${unit}')">➕ Tambah Indikator Baru</button>
    </div>`;
  }

  if(!items.length){
    h+=`<div class="card"><div class="empty-state"><div class="empty-icon">🎯</div><div>Belum ada indikator.</div></div></div>`;
    el.innerHTML=h; return;
  }

  items.forEach((item,idx)=>{
    const real=parseFloat(item.realisasi)||0;
    const tgt=parseFloat(item.targetBulan)||0;
    const gap=tgt>0?real-tgt:null;
    const pct=tgt>0?Math.min(Math.round(real/tgt*100),150):null;
    let cls='';
    if(gap!==null) cls=gap<-20?'danger':gap<0?'warn':'ok';

    h+=`<div class="ind-item ${cls}">
      <div class="flex-b mb-8" style="margin-bottom:10px">
        <div>
          <div class="fw6" style="font-size:14px">${item.nama}</div>
          <div class="text-xs text-muted mt-8" style="margin-top:4px">Satuan: ${item.satuan||'—'}</div>
        </div>
        <div class="flex gap-8">
          ${cls==='danger'?`<span class="badge badge-red">⚠️ Jauh di Bawah</span>`:cls==='warn'?`<span class="badge badge-orange">⚡ Di Bawah Target</span>`:gap!==null?`<span class="badge badge-green">✅ On Track</span>`:''}
          ${canEdit?`<button class="btn btn-blue btn-xs" onclick="_editIndikator('${item.id}')">✏️ Edit</button>`:''}
          ${canManage?`<button class="btn btn-red btn-xs" onclick="_delIndikator('${item.id}')">🗑</button>`:''}
        </div>
      </div>
      <div class="g3" style="gap:10px;margin-bottom:10px">
        <div><div class="text-xs text-muted">Target Tahunan</div><div class="fw6 text-gold">${item.targetTahunan||'—'} ${item.satuan||''}</div></div>
        <div><div class="text-xs text-muted">Target Kumulatif Bln Ini</div><div class="fw6">${item.targetBulan||'—'} ${item.satuan||''}</div></div>
        <div><div class="text-xs text-muted">Realisasi Bln Ini</div><div class="fw6 ${gap===null?'':gap<0?'text-red':'text-green'}">${item.realisasi||'—'} ${item.satuan||''}</div></div>
      </div>`;

    if(pct!==null){
      const col=pct<70?'var(--red)':pct<90?'var(--orange)':'var(--green)';
      h+=`<div class="prog-row"><div class="prog-wrap"><div class="prog-fill" style="width:${Math.min(pct,100)}%;background:${col}"></div></div>
        <span class="prog-pct" style="color:${col}">${pct}%</span></div>`;
    }

    if(gap!==null&&gap<0){
      h+=`<div class="fr mt-8" style="margin-top:8px"><label class="fl text-red" style="color:#fc8181">📌 Rencana Tindak Lanjut</label>
        <div style="background:rgba(229,62,62,0.06);border-radius:6px;padding:10px;font-size:13px">${item.rtl||'<span style="color:var(--text3)">Belum ada RTL</span>'}</div>
      </div>`;
    }

    h+=`</div>`;
  });

  el.innerHTML=h;
}

  let q;
  if(CU.role==='admin'||CU.role==='kadis'){
    q=query(collection(db,'logs'),orderBy('savedAt','desc'));
  } else {
    // Show own logs + subordinate logs
    const subs=ALL_USERS.filter(u=>u.superior===CU.id).map(u=>u.id);
    const ids=[CU.id,...subs];
    // Firestore 'in' max 10 — fallback to getAll
    q=query(collection(db,'logs'),orderBy('savedAt','desc'));
  }
  const snap=await getDocs(q);
  let logs=snap.docs.map(d=>({id:d.id,...d.data()}));

  if(CU.role!=='admin'&&CU.role!=='kadis'){
    const usSnap=await getDocs(collection(db,'users'));
    ALL_USERS=usSnap.docs.map(d=>({id:d.id,...d.data()}));
    const subs=ALL_USERS.filter(u=>u.superior===CU.id).map(u=>u.id);
    const ids=new Set([CU.id,...subs]);
    logs=logs.filter(l=>ids.has(l.user));
  }

  let h=`<div class="page-title">Log Kegiatan</div>
  <div class="page-sub">Riwayat kegiatan selesai & tervalidasi</div>
  <div class="card"><div class="card-header"><span class="card-title">📜 Riwayat</span><span class="card-badge">${logs.length} entri</span></div>`;
  if(!logs.length){
    h+=`<div class="empty-state"><div class="empty-icon">📜</div><div>Belum ada log kegiatan.</div></div>`;
  } else {
    h+=`<div class="scroll-box">`;
    logs.forEach(l=>{
      const typeLabel={kabid_work:'Pekerjaan Strategis',kasubag_work:'Pekerjaan Reguler',kasubag_urgent:'Pekerjaan Mendesak',staf_task:'Kegiatan Staf',star5:'⭐ Bintang 5'}[l.type]||l.type;
      h+=`<div class="log-entry">
        <div class="log-meta">${formatDate(l.date)} — ${l.userName||l.user} — ${l.userLabel||''}</div>
        <div class="flex-b">
          <div class="fw6">${l.desc||l.type==='star5'?`⭐ Mendapat nilai Bintang 5`:l.desc||'—'}</div>
          <span class="badge badge-gold">${typeLabel}</span>
        </div>
        ${l.output?`<div class="text-muted text-sm mt-8" style="margin-top:4px">Output: ${l.output}</div>`:''}
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}

  const usSnap=await getDocs(collection(db,'users'));
  const allU=usSnap.docs.map(d=>({id:d.id,...d.data()}));
  const supOpts=allU.filter(x=>x.id!==id).map(x=>`<option value="${x.id}" ${u.superior===x.id?'selected':''}>${x.name} (${x.role})</option>`).join('');
  showModal(`<div class="modal-title">✏️ Edit User: ${u.name}</div>
    <div class="g2">
      <div class="fr"><label class="fl">Nama Lengkap</label><input class="fi" id="eu-name" value="${u.name||''}"></div>
      <div class="fr"><label class="fl">Jabatan / Label</label><input class="fi" id="eu-label" value="${u.label||''}"></div>
      <div class="fr"><label class="fl">Unit Kerja</label><select class="fs" id="eu-unit">${unitOpts}</select></div>
      <div class="fr"><label class="fl">Role</label><select class="fs" id="eu-role">${roleOpts}</select></div>
      <div class="fr"><label class="fl">Atasan Langsung</label><select class="fs" id="eu-sup"><option value="">— Tidak ada —</option>${supOpts}</select></div>
      <div class="fr"><label class="fl">Password Baru (kosongkan jika tidak diubah)</label><input class="fi" id="eu-pass" placeholder="Kosongkan jika tidak diubah"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-red btn-sm" onclick="_closeModal()">Batal</button>
      <button class="btn btn-gold btn-sm" onclick="_saveEditUser('${id}')">💾 Simpan</button>
    </div>`);
};
window._saveEditUser=async function(id){
  const updates={
    name:document.getElementById('eu-name')?.value||'',
    label:document.getElementById('eu-label')?.value||'',
    unit:document.getElementById('eu-unit')?.value||'',
    role:document.getElementById('eu-role')?.value||'staf',
    superior:document.getElementById('eu-sup')?.value||null,
    updatedAt:new Date().toISOString(), updatedBy:CU.id
  };
  const pass=document.getElementById('eu-pass')?.value?.trim();
  if(pass) {
    if(pass.length<6){toast('⚠️ Password minimal 6 karakter!');return;}
    updates.pass=pass;
  }
  await updateDoc(doc(db,'users',id),updates);
  _closeModal(); toast('✅ User berhasil diperbarui!'); renderUsers();
};
window._toggleUserActive=async function(id,currentActive){
  if(!confirm(`${currentActive?'Nonaktifkan':'Aktifkan'} user ini?`)) return;
  await updateDoc(doc(db,'users',id),{active:!currentActive});
  toast(`✅ User ${currentActive?'dinonaktifkan':'diaktifkan'}!`); renderUsers();
};
window._delUser=async function(id){
  if(id==='admin'){toast('⚠️ Akun admin tidak bisa dihapus!');return;}
  if(!confirm('Hapus user ini PERMANEN? Semua data harian mereka tetap tersimpan.')) return;
  await deleteDoc(doc(db,'users',id));
  toast('🗑 User dihapus'); renderUsers();
};

</script>
</body>
</html>
